# Nginx hardening example for Zabbix frontend.
# Review paths, certificates, proxy headers, and CSP before production use.

server {
    listen 80;
    server_name zabbix.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zabbix.example.com;

    ssl_certificate     /etc/pki/tls/certs/zabbix.crt;
    ssl_certificate_key /etc/pki/tls/private/zabbix.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-ancestors 'self'" always;

    server_tokens off;

    location / {
        root /usr/share/zabbix;
        index index.php index.html;
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        root /usr/share/zabbix;
        fastcgi_pass unix:/run/php-fpm/zabbix.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }
}
