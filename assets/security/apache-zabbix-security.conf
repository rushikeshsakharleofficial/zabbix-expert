# Apache hardening example for Zabbix frontend.
# Review modules, certificate paths, and CSP before production use.

<VirtualHost *:80>
    ServerName zabbix.example.com
    Redirect permanent / https://zabbix.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName zabbix.example.com
    DocumentRoot /usr/share/zabbix

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/zabbix.crt
    SSLCertificateKeyFile /etc/pki/tls/private/zabbix.key

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-ancestors 'self'"
    ServerSignature Off

    <Directory /usr/share/zabbix>
        Require all granted
        Options FollowSymLinks
        AllowOverride None
    </Directory>
</VirtualHost>
