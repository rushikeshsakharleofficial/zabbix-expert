# Zabbix Agent2 encrypted transport example.
# Use unique identity and credential file per host. Do not reuse one value across the fleet.

Server=zabbix.example.com
ServerActive=zabbix.example.com
HostnameItem=system.hostname
TLSConnect=psk
TLSAccept=psk
TLSPSKIdentity=host-unique-identity
TLSPSKFile=/etc/zabbix/zabbix_agent2.psk
DenyKey=system.run[*]
